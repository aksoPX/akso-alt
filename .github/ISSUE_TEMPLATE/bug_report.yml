name: Bug report
about: Report a bug
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce it?
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Do not include cookies, passwords or AccountData.json.